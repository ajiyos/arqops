spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/architect_saas}
    username: ${SPRING_DATASOURCE_USERNAME:architect_user}
    password: ${SPRING_DATASOURCE_PASSWORD:architect_pass}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.arqops: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
