spring:
  mail:
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    show-sql: false

logging:
  level:
    com.arqops: INFO
    root: WARN
  pattern:
    console: '{"time":"%d","level":"%p","logger":"%logger","tenant":"%X{tenantId}","user":"%X{userId}","reqId":"%X{requestId}","msg":"%m"}%n'

server:
  tomcat:
    threads:
      max: 200
      min-spare: 20
