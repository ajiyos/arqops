services:

  reverse-proxy:
    image: docker.io/library/caddy:2.8-alpine
    restart: unless-stopped
    # Host ports: defaults 80/443 for servers. Rootless Podman / macOS cannot bind <1024 — use e.g.
    # CADDY_PUBLISH_HTTP_PORT=8080 CADDY_PUBLISH_HTTPS_PORT=8443 (see .env.prod.example).
    ports:
      - "${CADDY_PUBLISH_HTTP_PORT:-80}:80"
      - "${CADDY_PUBLISH_HTTPS_PORT:-443}:443"
      - "${CADDY_PUBLISH_HTTPS_PORT:-443}:443/udp"
    environment:
      CORS_ORIGIN: ${CORS_ORIGIN:-https://arqops.com}
      APP_DOMAIN: ${APP_DOMAIN:-arqops.com,www.arqops.com}
      CANONICAL_APP_HOST: ${CANONICAL_APP_HOST:-arqops.com}
      API_DOMAIN: ${API_DOMAIN:-api.arqops.com}
      ACME_EMAIL: ${ACME_EMAIL:-admin@arqops.com}
    volumes:
      - ./infra/prod/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ${DOCKER_REGISTRY:-registry.digitalocean.com/arqops}/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL}
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ${DOCKER_REGISTRY:-registry.digitalocean.com/arqops}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      JAVA_TOOL_OPTIONS: >-
        -Xms512m -Xmx2048m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2560M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      # Flyway + JVM on a small Droplet can exceed 45s; image must include curl (see backend Dockerfile).
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  worker:
    image: ${DOCKER_REGISTRY:-registry.digitalocean.com/arqops}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: worker,prod
      JAVA_TOOL_OPTIONS: >-
        -Xms256m -Xmx1024m
        -XX:+UseG1GC
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1280M
    # Worker profile uses web-application-type: none — no HTTP server; do not curl :8080.
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  caddy_data:
  caddy_config:
